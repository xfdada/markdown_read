name: Build Windows EXE

# Trigger: manually click "Run workflow"  OR  push a version tag
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    name: Build Windows (doc-reader.exe)
    runs-on: windows-latest

    steps:
      # ── Checkout source (no document data needed) ─────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Install runtime deps + Nuitka ─────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install flask bcrypt markdown Pygments nuitka zstandard ordered-set

      # ── Build .exe with Nuitka ────────────────────────────────────────────
      # Nuitka compiles Python → C++ → machine code.
      # --onefile bundles everything into a single self-extracting exe.
      # --windows-console-mode=disable suppresses the terminal window.
      # --include-data-dir copies templates/ next to the extracted exe.
      # --nofollow-import-to=* + explicit --include-module= keeps size down.
      - name: Build with Nuitka
        run: >
          python -m nuitka
          --onefile
          --windows-console-mode=disable
          --output-filename=doc-reader.exe
          --output-dir=dist
          --include-data-dir=templates=templates
          --include-module=flask
          --include-module=bcrypt
          --include-module=markdown
          --include-module=markdown.extensions.extra
          --include-module=markdown.extensions.codehilite
          --include-module=markdown.extensions.toc
          --include-module=markdown.extensions.fenced_code
          --include-module=markdown.extensions.tables
          --include-module=markdown.extensions.footnotes
          --include-module=markdown.extensions.attr_list
          --include-module=markdown.extensions.def_list
          --include-module=pygments
          --include-module=pygments.lexers
          --include-module=pygments.lexers.python
          --include-module=pygments.lexers.shell
          --include-module=pygments.lexers.javascript
          --include-module=pygments.lexers.data
          --include-module=pygments.formatters
          --include-module=pygments.formatters.html
          --include-module=pygments.styles
          --include-module=pygments.styles.friendly
          --assume-yes-for-downloads
          app.py

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload doc-reader.exe
        uses: actions/upload-artifact@v4
        with:
          name: doc-reader-windows
          path: dist/doc-reader.exe
          retention-days: 30

            > `config.json` 和 `document/` 需自行从本地 `dist/` 目录复制，不包含在此 Release 中（含加密密钥）。
